log_format wedding_diagnostics
  '$remote_addr - $remote_user [$time_local] '
  '"$request" status=$status bytes=$body_bytes_sent '
  'request_time=$request_time upstream_time=$upstream_response_time upstream_status=$upstream_status '
  'host="$host" server="$server_name" request_id="$request_id" x_request_id="$http_x_request_id" '
  'ssl_protocol="$ssl_protocol" ssl_cipher="$ssl_cipher" '
  'referer="$http_referer" user_agent="$http_user_agent"';
